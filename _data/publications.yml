    - "Dawei Yin"

- slug: "22-corr-sha"
  title: "HMM-V: Heterogeneous Memory Management for Virtualization"
  year: "2022"
  pub_type: "Journal Article"
  venue: "CoRR"
  publication: "Computing Research Repository"
  abstract: "The memory demand of virtual machines (VMs) is increasing, while DRAM has limited capacity and high power consumption. Non-volatile memory (NVM) is an alternative to DRAM, but it has high latency and low bandwidth. We observe that the VM with heterogeneous memory may incur up to a 1.5× slowdown compared to a DRAM VM, if not managed well. However, none of the state-of-the-art heterogeneous memory management designs are customized for virtualization on a real system. In this paper, we propose HMM-V, a Heterogeneous Memory Management system for Virtualization. HMM-V automatically determines page hotness and migrates pages between DRAM and NVM to achieve performance close to the DRAM system. First, HMM-V tracks memory accesses through page table manipulation, but reduces the cost by leveraging Intel page-modification logging (PML) and a multi-level queue. Second, HMM-V quantifies the ``temperature' of page and determines the hot set with bucket-sorting. HMM-V then efficiently migrates pages with minimal access pause and handles dirty pages with the assistance of PML. Finally, HMM-V provides pooling management to balance precious DRAM across multiple VMs to maximize utilization and overall performance. HMM-V is implemented on a real system with Intel Optane DC persistent memory. The four-VM co-running results show that HMM-V outperforms NUMA balancing and hardware management (Intel Optane memory mode) by 51% and 31%, respectively."
  url_pdf: "https://arxiv.org/pdf/2209.13111"
  authors:
    - "Sai Sha"
    - "Chuandong Li"
    - "Yingwei Luo"
    - "Xiaolin Wang"
    - "Zhenlin Wang"

- slug: "22-emnlp-wen"
  title: "M3: A Multi-View Fusion and Multi-Decoding Network for Multi-Document Reading Comprehension"
  year: "2022"
  pub_type: "Conference Paper"
  venue: "EMNLP 22"
  publication: "Empirical Methods in Natural Language Processing"
  abstract: "Multi-document reading comprehension task requires collecting evidences from different documents for answering questions. Previous research works either use the extractive modeling method to naively integrate the scores from different documents on the encoder side or use the generative modeling method to collect the clues from different documents on the decoder side individually. However, any single modeling method cannot make full of the advantages of both. In this work, we propose a novel method that tries to employ a multi-view fusion and multi-decoding mechanism to achieve it. For one thing, our approach leverages question-centered fusion mechanism and cross-attention mechanism to gather fine-grained fusion of evidence clues from different documents in the encoder and decoder concurrently. For another, our method simultaneously employs both the extractive decoding approach and the generative decoding method to effectively guide the training process. Compared with existing methods, our method can perform both extractive decoding and generative decoding independently and optionally. Our experiments on two mainstream multi-document reading comprehension datasets (Natural Questions and TriviaQA) demonstrate that our method can provide consistent improvements over previous state-of-the-art methods."
  url_pdf: "https://aclanthology.org/2022.emnlp-main.94.pdf"
  authors:
    - "Liang Wen"
    - "Houfeng Wang"
    - "Yingwei Luo"
    - "Xiaolin Wang"

- slug: "22-icassp-wen"
  title: "A Question-Oriented Propagation Network for News Reading Comprehension."
  year: "2022"
  pub_type: "Conference Paper"
  venue: "ICASSP 22"
  publication: "International Conference on Acoustics, Speech and Signal Processing"
  abstract: "Machine reading comprehension of news articles remains to be a challenging task since the lengths of its context documents are long. Such reading comprehension task usually requires document-level language understanding while state-of-the-art, pretrained question answering models can only encode sequences with a predefined length limit. In this paper, we propose a novel Question-Oriented Propagation Network (QOPN) model for such task. Specifically, our proposed QOPN first uses a context encoding module to find local question-related clues. Then, it employs a multi-step reasoning module to aggregate question-focused information for iterative reasoning. The novel design put emphasis on capturing question-related information and allow long-range information integration, which is especially beneficial for long-context reading comprehension task. Experiments on two challenging machine comprehension datasets show that the proposed QOPN significantly outperforms previous state-of-the-art models."
  url_pdf: "https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=9747142"
  authors:
