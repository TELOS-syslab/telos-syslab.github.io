    - "Dawei Yin"

- slug: "22-iccd-li"
  title: "Graph Neural Networks Based Memory Inefficiency Detection Using Selective Sampling"
  year: "2022"
  pub_type: "Conference Paper"
  venue: "SC 22"
  publication: "2022 International Conference for High Performance Computing, Networking, Storage and Analysis (SC22)"
  abstract: "Production software of data centers oftentimes suffers from unnecessary memory inefficiencies caused by inappropriate use of data structures, conservative compiler optimizations, and so forth. Nevertheless, whole-program monitoring tools often incur incredibly high overhead due to fine-grained memory access instrumentation. Consequently, the fine-grained monitoring tools are not viable for long-running, large-scale data center applications due to strict latency criteria (e.g., service-level agreement or SLA). To this end, this work presents a novel learning-aided system, namely Puffin, to identify three kinds of unnecessary memory operations including dead stores, silent loads and silent stores, by applying gated graph neural networks onto fused static and dynamic program semantics with respect to relative positional embedding. To deploy the system in large-scale data centers, this work explores a sampling-based detection infrastructure with high efficacy and negligible overhead. We evaluate Puffin upon the well-known SPEC CPU 2017 benchmark suite for four compilation options. Experimental results show that the proposed method is able to capture the three kinds of memory inefficiencies with as high accuracy as 96% and a reduced checking overhead by 5.66脳 over the state-of-the-art tool."
  url_pdf: "https://dl.acm.org/doi/pdf/10.5555/3571885.3571998"
  authors:
    - "Pengcheng Li"
    - "Yixin Guo"
    - "Yingwei Luo"
    - "Xiaolin Wang"
    - "Zhenlin Wang"
    - "Xu Liu"

- slug: "22-iccd-yang"
  title: "Tear Up the Bubble Boom: Lessons Learned From a Deep Learning Research and Development Cluster"
  year: "2022"
  pub_type: "Conference Paper"
  venue: "ICCD 22"
  publication: "International Conference on Computer Design (ICCD)"
  abstract: "With the proliferation of deep learning, there exists a strong need to efficiently operate GPU clusters for deep learning production in giant AI companies, as well as for research and development (R&D) in small-sized research institutes and universities. Existing works have performed thorough trace analysis on large-scale production-level clusters in giant companies, which discloses the characteristics of deep learning production jobs and motivates the design of scheduling frameworks. However, R&D clusters significantly differ from production-level clusters in both job properties and user behaviors, calling for a different scheduling mechanism. In this paper, we present a detailed workload characterization of an R&D cluster, CloudBrain-I, in a research institute, Peng Cheng Laboratory. After analyzing the fine-grained resource utilization, we discover a severe problem for R&D clusters, resource underutilization, which is especially important in R&D clusters while not characterised by existing works. We further investigate two specific underutilization phenomena and conclude several implications and lessons on R&D cluster scheduling. The traces will be open-sourced to motivate further studies in the community."
  url_pdf: "https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=9978490"
  authors:
