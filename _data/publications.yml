- slug: "25-sosp-li"
  title: "Aeolia: A Fast and Secure Userspace Interrupt-Based Storage Stack"
  year: "2025"
  pub_type: "Conference Paper"
  venue: "SOSP 25"
  publication: "CM SIGOPS 31st Symposium on Operating Systems Principles (SOSP 25)"
  abstract: "Polling-based userspace storage stacks achieve great I/O performance. However, they cannot efficiently and securely share disks and CPUs among multiple tasks. In contrast, interrupt-based kernel stacks inherently suffer from subpar I/O performance but achieve advantages in resource sharing.We present Aeolia, a novel storage stack that achieves great I/O performance while offering efficient and secure resource sharing. Aeolia is an interrupt-based userspace storage stack, representing a new point in the design space previously considered unfeasible. Our main observation is that, contrary to conventional wisdom, polling offers only marginal disk performance improvements over interrupts. Aeolia exploits user interrupt, an emerging hardware feature commonly used for userspace IPIs, in a novel way to deliver storage interrupts directly to userspace, thereby achieving high I/O performance with direct access. Aeolia leverages the hardware intra-process isolation features and sched_ext, an eBPF-based userspace scheduling framework, to efficiently and securely share CPUs and disks among multiple tasks, challenging the common belief that these are inherent disadvantages of userspace storage stacks. The above design enables Aeolia to realize AeoFS, a high-performance library file system that securely and directly accesses disks. Our evaluation shows that Aeolia outperforms Linux by 2脳 and AeoFS outperforms ext4 by up to 19.1脳, respectively."
  doi: "https://doi.org/10.1145/3731569.3764816"
  url_pdf: "https://dl.acm.org/doi/pdf/10.1145/3731569.3764816"
  url_code: "https://github.com/TELOS-syslab/Aeolia"
