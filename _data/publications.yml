    - "Yingwei Luo"
    - "Xiaolin Wang"
    - "Zhenlin Wang"
    - "Tianwei Zhang"

- slug: "22-icpc-guo"
  title: "Exploring GNN based program embedding technologies for binary related tasks"
  year: "2022"
  pub_type: "Conference Paper"
  venue: "ICPC 22"
  publication: "International Conference on Program Comprehension"
  abstract: "With the rapid growth of program scale, program analysis, maintenance and optimization become increasingly diverse and complex. Applying learning-assisted methodologies onto program analysis has attracted ever-increasing attention. However, a large number of program factors including syntax structures, semantics, running platforms and compilation configurations block the effective realization of these methods. To overcome these obstacles, existing works prefer to be on a basis of source code or abstract syntax tree, but unfortunately are sub-optimal for binary-oriented analysis tasks closely related to the compilation process. To this end, we propose a new program analysis approach that aims at solving program-level and procedure-level tasks with one model, by taking advantage of the great power of graph neural networks from the level of binary code. By fusing the semantics of control flow graphs, data flow graphs and call graphs into one model, and embedding instructions and values simultaneously, our method can effectively work around emerging compilation-related problems. By testing the proposed method on two tasks, binary similarity detection and dead store prediction, the results show that our method is able to achieve as high accuracy as 83.25%, and 82.77%."
  url_pdf: "https://dl.acm.org/doi/pdf/10.1145/3524610.3527900"
  authors:
    - "Yixin Guo"
    - "Pengcheng Li"
    - "Yingwei Luo"
    - "Xiaolin Wang"
    - "Zhenlin Wang"

- slug: "22-ieee-sha"
  title: "Accelerating Address Translation for Virtualization by Leveraging Hardware Mode"
  year: "2022"
  pub_type: "Journal Article"
  venue: "TC"
  publication: "IEEE Transactions on Computers"
  abstract: "The overhead of memory virtualization remains nontrivial. The traditional shadow paging (TSP) resorts to a shadow page table (SPT) to achieve the native page walk speed, but page table updates require hypervisor interventions. Alternatively, nested paging enables low-overhead page table updates, but utilizes the hardware MMU to perform a long-latency two-dimensional page walk. This paper proposes new memory virtualization solutions based on hardware (machine) mode—the highest CPU privilege level in some architectures like Sunway and RISC-V. A programming interface, running in hardware mode, enables software-implementation of hardware support functions. We first propose Software-based Nested Paging (SNP), which extends the software MMU to perform a two-dimensional page walk in hardware mode. Second, we present Swift Shadow Paging (SSP), which accomplishes page table synchronization by intercepting TLB flushing in hardware mode. Finally we propose Accelerated Shadow Paging (ASP) combining SSP and SNP. ASP handles the last-level SPT page faults by walking two-dimensional page tables in hardware mode, which eliminates most hypervisor interventions. This paper systematically compares multiple memory virtualization models by analyzing their designs and evaluating their performance both on a real system and a simulator. The experiments show that the virtualization overhead of ASP is less than 4.5% for all workloads."
  url_pdf: "https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=9693114"
  authors:
    - "Sai Sha"
    - "Chuandong Li"
    - "Yingwei Luo"
    - "Xiaolin Wang"
    - "Zhenlin Wang"

- slug: "22-ipdps-wang"
  title: "GSpecPal: Speculation-Centric Finite State Machine Parallelization on GPUs"
  year: "2022"
  pub_type: "Conference Paper"
  venue: "IPDPS 22"
  publication: "2022 IEEE International Parallel and Distributed Processing Symposium (IPDPS)"
  abstract: "Finite State Machine (FSM) plays a critical role in many real-world applications, ranging from pattern matching to network security. In recent years, significant research efforts have been made to accelerate FSM computations on different parallel platforms, including multicores, GPUs, and DRAM-based accelerators. A popular direction is the speculation-centric parallelization. Despite their abundance and promising results, the benefits of speculation-centric FSM parallelization on GPUs heavily depend on high speculation accuracy and are greatly limited by the inefficient sequential recovery. Inspired by speculative data forwarding used in Thread Level Speculation (TLS), this work addresses the existing bottlenecks by introducing speculative recovery with two heuristics for thread scheduling, which can effectively remove redundant computations and increase the GPU thread utilization. To maximize the performance of running FSMs on GPUs, this work integrates different speculative parallelization schemes into a latency-sensitive framework, GSpecPal, along with a scheme selector which aims to automatically configure the optimal GPU-based parallelization for a given FSM. Evaluation on a set of real-world FSMs with diverse characteristics confirms the effectiveness of GSpecPal. Experimental results show that GSpecPal can obtain 7.2脳 speedup on average (up to 20脳) over the state-of-the-art on an Nvidia GeForce RTX 3090 GPU."
  url_pdf: "https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=9820624"
  authors:
    - "Yuguang Wang"
    - "Robbie Watling"
    - "Junqiao Qiu"
    - "Zhenlin Wang"

- slug: "22-tpds-ye"
  title: "Astraea: A Fair Deep Learning Scheduler for Multi-Tenant GPU Clusters"
  year: "2022"
  pub_type: "Journal Article"
  venue: "TPDS"
  publication: "IEEE Transactions on Parallel and Distributed Systems"
  abstract: "Modern GPU clusters are designed to support distributed Deep Learning jobs from multiple tenants concurrently. Each tenant may have varied and dynamic resource demands. Unfortunately, existing GPU schedulers fail to thoroughly consider the fairness among the tenants and jobs, which can result in unbalanced resource allocation and unfair user experience. In this article, we present an efficient solution to provide strong fairness while maintaining high scheduling effectiveness in multi-tenant GPU clusters. First, we introduce a novel Long-Term GPU-time Fairness metric, which can comprehensively evaluate the fairness at both the tenant and job levels, based on both the temporal and spatial impacts of resource allocation. Second, we design a new and practical GPU scheduler, Astraea, to enforce the desired fairness among tenants and jobs. Large-scale evaluations show that Astraea can improve tenant fairness by up to 9.42× compared to state-of-the-art schedulers, without sacrificing the average job completion time."
  url_pdf: "https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=9655467"
